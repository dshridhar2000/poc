# For most projects, this workflow file will not need changing; you simply need
# to commit it to your repository.
#
# You may wish to alter this file to override the set of languages analyzed,
# or to provide custom queries or build logic.
#
# ******** NOTE ********
# We have attempted to detect the languages in your repository. Please check
# the `language` matrix defined below to confirm you have the correct set of
# supported CodeQL languages.
#
name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '43 2 * * 6'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # Runner size impacts CodeQL analysis time. To learn more, please see:
    #   - https://gh.io/recommended-hardware-resources-for-running-codeql
    #   - https://gh.io/supported-runners-and-hardware-resources
    #   - https://gh.io/using-larger-runners (GitHub.com only)
    # Consider using larger runners or machines with greater resources for possible analysis time improvements.
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      # required for all workflows
      security-events: write

      # required to fetch internal or private CodeQL packs
      packages: read

      # only required for workflows in private repositories
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: actions
          build-mode: none
        - language: go
          build-mode: autobuild
        - language: java-kotlin
          build-mode: none # This mode only analyzes Java. Set this to 'autobuild' or 'manual' to analyze Kotlin too.
        - language: javascript-typescript
          build-mode: none
        # CodeQL supports the following values keywords for 'language': 'actions', 'c-cpp', 'csharp', 'go', 'java-kotlin', 'javascript-typescript', 'python', 'ruby', 'rust', 'swift'
        # Use `c-cpp` to analyze code written in C, C++ or both
        # Use 'java-kotlin' to analyze code written in Java, Kotlin or both
        # Use 'javascript-typescript' to analyze code written in JavaScript, TypeScript or both
        # To learn more about changing the languages that are analyzed or customizing the build mode for your analysis,
        # see https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/customizing-your-advanced-setup-for-code-scanning.
        # If you are analyzing a compiled language, you can modify the 'build-mode' for that language to customize how
        # your codebase is analyzed, see https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/codeql-code-scanning-for-compiled-languages
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Add any setup steps before running the `github/codeql-action/init` action.
    # This includes steps like installing compilers or runtimes (`actions/setup-node`
    # or others). This is typically only required for manual builds.
    # - name: Setup runtime (example)
    #   uses: actions/setup-example@v1

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        # If you wish to specify custom queries, you can do so here or in a config file.
        # By default, queries listed here will override any specified in a config file.
        # Prefix the list here with "+" to use these queries and those in the config file.

        # For more details on CodeQL's query packs, refer to: https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs
        # queries: security-extended,security-and-quality

    # If the analyze step fails for one of the languages you are analyzing with
    # "We were unable to automatically build your code", modify the matrix above
    # to set the build mode to "manual" for that language. Then modify this step
    # to build your code.
    # ℹ️ Command-line programs to run using the OS shell.
    # 📚 See https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#jobsjob_idstepsrun
    - name: Run manual build steps
      if: matrix.build-mode == 'manual'
      shell: bash
      run: |
        echo 'If you are using a "manual" build mode for one or more of the' \
          'languages you are analyzing, replace this with the commands to build' \
          'your code, for example:'
        echo '  make bootstrap'
        echo '  make release'
        exit 1

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
    
  generate-report:
    name: Generate CodeQL CSV Report
    needs: analyze
    runs-on: ubuntu-latest
  
    permissions:
      security-events: read
      contents: read
  
    steps:
      - uses: actions/checkout@v4
  
      ##########################################################################
      # Generate report filename
      ##########################################################################
      - name: Generate Report Name
        shell: bash
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
      
          # Replace '/' with '-'
          REF_NAME="${GITHUB_REF_NAME//\//-}"
      
          REPORT_DATE=$(date -u +"%d%b%Y")
      
          ARTIFACT_NAME="codeql-report-${REF_NAME}-${SHORT_SHA}"
      
          REPORT_FILE="${ARTIFACT_NAME}-${REPORT_DATE}.csv"
      
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV
          echo "REPORT_FILE=$REPORT_FILE" >> $GITHUB_ENV
      
          echo "Artifact Name : $ARTIFACT_NAME"
          echo "Report File   : $REPORT_FILE"
  
      ##########################################################################
      # Wait a few seconds for GitHub to finish indexing CodeQL results
      ##########################################################################
      - name: Wait for Code Scanning
        run: sleep 20
  
      ##########################################################################
      # Download alerts
      ##########################################################################
      - name: Download CodeQL Alerts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/code-scanning/alerts?per_page=100" \
            --paginate > codeql-report.json
  
      ##########################################################################
      # Generate CSV
      ##########################################################################
      - name: Generate CSV Report
        shell: bash
        run: |
          python3 << 'EOF'
          import csv
          import json
          import os
          import subprocess
          from datetime import datetime
  
          commit_sha = subprocess.check_output(
              ["git","rev-parse","HEAD"],
              text=True
          ).strip()
  
          short_sha = subprocess.check_output(
              ["git","rev-parse","--short","HEAD"],
              text=True
          ).strip()
  
          ref_name = os.environ.get("GITHUB_REF_NAME","")
  
          scan_date = datetime.utcnow().strftime("%d-%b-%Y %H:%M:%S UTC")
  
          with open("codeql-report.json","r",encoding="utf-8") as f:
              alerts = json.load(f)
  
          with open("report.csv","w",newline="",encoding="utf-8") as csvfile:
  
              writer = csv.writer(csvfile)
  
              writer.writerow([
                  "Branch/Release",
                  "Commit SHA",
                  "Short Commit",
                  "Scan Date",
                  "Severity",
                  "Rule ID",
                  "Rule Name",
                  "Description",
                  "State",
                  "Tool",
                  "File",
                  "Line",
                  "Alert URL"
              ])
  
              for alert in alerts:
  
                  rule = alert.get("rule",{})
  
                  severity = (
                      rule.get("security_severity_level")
                      or rule.get("severity")
                      or "Unknown"
                  )
  
                  location = (
                      alert.get("most_recent_instance",{})
                           .get("location",{})
                  )
  
                  writer.writerow([
                      ref_name,
                      commit_sha,
                      short_sha,
                      scan_date,
                      severity,
                      rule.get("id",""),
                      rule.get("name",""),
                      rule.get("description",""),
                      alert.get("state",""),
                      alert.get("tool",{}).get("name",""),
                      location.get("path",""),
                      location.get("start_line",""),
                      alert.get("html_url","")
                  ])
  
          print(f"Generated CSV with {len(alerts)} alerts.")
          EOF
  
      ##########################################################################
      # Rename report
      ##########################################################################
      - name: Rename CSV Report
        shell: bash
        run: |
          mv report.csv "$REPORT_NAME"
  
      ##########################################################################
      # Verify
      ##########################################################################
      - name: Verify Report
        shell: bash
        run: |
          pwd
          ls -lh
          test -f "$REPORT_NAME"
  
      ##########################################################################
      # Upload
      ##########################################################################
      - name: Upload CodeQL Report
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.REPORT_FILE }}
          retention-days: 90
          if-no-files-found: error
